events {
    worker_connections 1024;
}

http {
    upstream client {
        server client:3000;
    }

    upstream admin {
        server admin:3001;
    }

    upstream backend {
        server backend:3334;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name rmmovingexpress.com www.rmmovingexpress.com admin.rmmovingexpress.com;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Client Frontend (Main Website) - HTTPS
    server {
        listen 443 ssl;
        server_name rmmovingexpress.com www.rmmovingexpress.com;

        ssl_certificate /etc/letsencrypt/live/rmmovingexpress.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/rmmovingexpress.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://client;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Handle /common/ API calls - strip /common prefix and add /api/v1
        location /common/ {
            rewrite ^/common/(.*)$ /api/v1/common/$1 break;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Handle /image/ requests - serve images from nginx static folder
        location /image/ {
            alias /usr/share/nginx/html/image/;
            try_files $uri $uri/ =404;
        }
    }

    # Admin Panel - HTTPS
    server {
        listen 443 ssl;
        server_name admin.rmmovingexpress.com;

        ssl_certificate /etc/letsencrypt/live/rmmovingexpress.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/rmmovingexpress.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://admin;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
