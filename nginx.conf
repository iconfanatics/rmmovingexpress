events {
    worker_connections 1024;
}

http {
    upstream client {
        server client:3000;
    }

    upstream admin {
        server admin:3001;
    }

    upstream backend {
        server backend:3334;
    }

    # Client Frontend (Main Website)
    server {
        listen 80;
        server_name rmmovingexpress.com www.rmmovingexpress.com;

        location / {
            proxy_pass http://client;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # API calls to backend
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Admin Panel
    server {
        listen 80;
        server_name admin.rmmovingexpress.com;

        location / {
            proxy_pass http://admin;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # Backend API (Direct access if needed)
    server {
        listen 80;
        server_name api.rmmovingexpress.com;

        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
